name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: firebase-hosting-production
    steps:
      - uses: actions/checkout@v4

      - name: Check if secret exists
        env:
          MY_SECRET: ${{ secrets.VITE_DATA_PROVIDER }}
        if: ${{ env.VITE_DATA_PROVIDER == '' }}
        run: echo "Secret is missing! Please configure it in Settings > Secrets."
