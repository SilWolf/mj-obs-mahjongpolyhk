name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    environment: firebase-hosting-production
    steps:
      - uses: actions/checkout@v4
      - run: yarn install --frozen-lockfile
      - run: yarn build
        env:
          VITE_ORGANIZATION: ${{ secrets.VITE_ORGANIZATION }}
          VITE_DATA_PROVIDER: ${{ secrets.VITE_DATA_PROVIDER }}
          VITE_UPLOAD_RESULT_ENDPOINT: ${{ secrets.VITE_UPLOAD_RESULT_ENDPOINT }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HKMJBS_STREAMING }}
          projectId: hkmjbs-streaming
          target: mahjongpolyhk
